template: 13-acoustic-measurement-report
format: html-letter-portrait-print
output_filename: acoustic-report.html

fields:
  - name: serial
    source: design.md
    required: true
  - name: family_accent
    source: derived
    required: true
  - name: measurement_setup
    source: study/README.md → instrumentation list + protocol
    required: true
  - name: per_note_results
    description: Per-note rows — predicted, measured, error, harmonic table, T60, SPL
    source: study/data/*.csv aggregated
    required: true
  - name: aggregate_charts
    description: Paths to generated chart images (PNG)
    source: generated by render.py from study/data/*.csv
    required: true
  - name: discussion
    source: study/README.md → analysis plan + observations
    required: false
  - name: limitations
    source: study/README.md → scope notes
    required: true
